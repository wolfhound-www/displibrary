<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<link rel="stylesheet" href="../layui/css/layui.css">
	<link rel="stylesheet" href="../detailpage.css">
</head>
<body>
	<form class="layui-form-item">
		<div class="layui-form-mid searchTips" id="searchTips"></div>
		<button type="button" class="layui-btn layui-btn-normal layui-bg-green searchBtn" id="searchBtn"><i class="layui-icon">&#xe615;</i></button>
		<input type="search" lay-verify="required" autocomplete="off" id="search" placeholder="输入搜索关键词" class="layui-input search">
	</form>

	<table class="layui-hide" id="detail"></table>
       
	<script src="../layui/layui.js"></script>
	<script>
		layui.use('table', function(){
			var  table = layui.table, $ = layui.$;
			var search = "";

			$("#searchBtn").click(function(){
				search = $("#search").val().replace(/(^\s*)|(\s*$)/g,"");
				if (search != "") {
					$("#searchTips").html("当前搜索关键词：<span class='layui-badge layui-bg-green keyword'>"+search+"</span>");
				} else {
					$("#searchTips").html("");
				}
				table.reload('detailpage');
			});

			table.render({
				elem: '#detail'
				,id: "detailpage"
				,url: "./a.json"
				,cols: [[
					{field:'num', title: '序号', width:60, unresize:true, type:'numbers'}
					,{field:'fileId', title: '文号', sort:true, width:220, unresize:true}
					,{field:'fileName', title: '名称', sort:true, unresize:true, templet: '<div><a href="{{d.url}}"  target="_blank">{{d.fileName}}</a></div>'}
					,{field:'fileTag', title: '标签', width:220
						, templet: function(d){
							var tags=d.fileTag.split(" ");
							var fileTagDisplay="";
							if (d.fileTag != ""){
								tags.forEach(function(item){
									fileTagDisplay+="<span class='layui-badge layui-bg-green tag'>"+item+"</span>";
								});
							}
							return fileTagDisplay;
					}}
				]]

					,done:function(res){
						var that = this.elem.next();
						res.data.forEach(function (item, index) {
							if (search != "") {
								if (item.fileId.search(new RegExp(search, 'i')) == -1 && item.fileName.search(new RegExp(search, 'i')) == -1 && item.fileTag.search(new RegExp(search, 'i')) == -1 && item.fileKeyword.search(new RegExp(search, 'i')) == -1) {
									var tr = that.find(".layui-table-box tbody tr[data-index='" + index + "']");
									tr.css("display", "none");
							}}
						});
					}
			});

		});
	</script>  
</body>
</html>
